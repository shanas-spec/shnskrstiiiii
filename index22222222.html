<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shans Search - Barcelona</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #FFDEE9, #B5FFFC);
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }
        h1 { color: #576574; text-align: center; }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #A1C4FD;
            border-radius: 25px;
            outline: none;
        }
        button {
            padding: 12px 25px;
            background: #FF9A9E;
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
        }
        button:hover { background: #FEB47B; }
        #result { text-align: left; }
        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border-left: 4px solid #FF9A9E;
        }
        .card h4 { margin: 0 0 10px 0; color: #576574; }
        .card p { margin: 5px 0; color: #666; }
        .loading, .error { color: #576574; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Shans Search - Barcelona</h1>
        
        <form id="searchForm" class="search-box">
            <input type="text" id="searchInput" placeholder="Cari: gracia, bunkers, pintxos..." required>
            <button type="submit">Search</button>
        </form>

        <div id="result"></div>
    </div>

    <script>
        const searchForm = document.getElementById('searchForm');
        const searchInput = document.getElementById('searchInput');
        const resultDiv = document.getElementById('result');

        searchForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const keyword = searchInput.value.trim();
            
            if (!keyword) return alert('Masukkan kata kunci');
            
            resultDiv.innerHTML = '<p class="loading">Mencari...</p>';

            try {
                const response = await fetch(`https://barcelona-backend-sss.vercel.app/search?q=${keyword}&method=bfs`);
                const data = await response.json();
                
                if (data.success && data.results.length > 0) {
                    let html = '';
                    data.results.forEach(item => {
                        html += `
                            <div class="card">
                                <h4>${item.name}</h4>
                                <p><strong>${item.category}</strong></p>
                                <p>${item.description}</p>
                            </div>
                        `;
                    });
                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.innerHTML = '<p>Tidak ada hasil</p>';
                }
            } catch (error) {
                resultDiv.innerHTML = '<p class="error">Backend tidak aktif. Jalankan python app.py</p>';
            }
        });
    </script>
</body>
</html>
